<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroPoint LTD &mdash; Engineering Digital Growth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --red:#E50914;--rd:#b0060f;--glow:rgba(229,9,20,.35);
  --w:#fff;--g2:#c4c4cc;--g4:#8888a0;--g6:#444458;
  --dk:#07070e;--dk2:#0d0d1a;--dk3:#131324;
  --gl:rgba(255,255,255,.04);--glb:rgba(255,255,255,.085);--glh:rgba(255,255,255,.07);
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--dk);color:var(--w);font-family:var(--fb);overflow-x:hidden}
@media(pointer:fine){body{cursor:none}}
::selection{background:var(--red);color:#fff}
a{color:inherit;text-decoration:none}
/* CURSOR - desktop only */
#cur,#curR{position:fixed;pointer-events:none;z-index:99999;border-radius:50%;transform:translate(-50%,-50%);display:none}
@media(pointer:fine){#cur,#curR{display:block}}
#cur{width:10px;height:10px;background:var(--red);transition:width .15s,height .15s}
#curR{width:34px;height:34px;border:1.5px solid rgba(229,9,20,.5);transition:width .2s,height .2s,border-color .2s}
#cur.h{width:5px;height:5px}
#curR.h{width:48px;height:48px;border-color:var(--red)}
/* CANVAS */
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none}
/* LOADER */
#ldr{position:fixed;inset:0;background:var(--dk);z-index:100000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;transition:opacity .7s,visibility .7s}
#ldr.out{opacity:0;visibility:hidden;pointer-events:none}
.ldr-logo{font-family:var(--fd);font-size:2rem;font-weight:800;letter-spacing:-.02em}
.ldr-logo b{color:var(--red)}
.ldr-bar-w{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.ldr-bar{height:100%;background:var(--red);border-radius:2px;animation:lp 1.5s ease forwards}
@keyframes lp{from{width:0}to{width:100%}}
.ldr-txt{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--g4)}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(7,7,14,.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--glb)}
.nlogo{font-family:var(--fd);font-size:1.2rem;font-weight:800;letter-spacing:-.02em;color:var(--w);cursor:pointer;display:flex;align-items:center;gap:2px}
.nlogo b{color:var(--red)}
.nlinks{display:flex;align-items:center;gap:32px;list-style:none}
.nlinks a{font-size:.875rem;font-weight:500;color:var(--g2);letter-spacing:.02em;transition:color .2s;position:relative;cursor:pointer}
.nlinks a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:var(--red);transition:width .3s}
.nlinks a:hover,.nlinks a.on{color:#fff}
.nlinks a:hover::after,.nlinks a.on::after{width:100%}
#nav-right{display:flex;align-items:center;gap:10px}
.ncta{background:var(--red);color:#fff;padding:9px 20px;border-radius:7px;font-weight:600;font-size:.85rem;box-shadow:0 0 20px var(--glow);cursor:pointer;border:none;font-family:var(--fb);transition:background .2s,transform .2s,box-shadow .2s}
.ncta:hover{background:var(--rd);transform:translateY(-1px);box-shadow:0 0 35px var(--glow)}
.nubtn{display:flex;align-items:center;gap:8px;background:var(--gl);border:1px solid var(--glb);border-radius:8px;padding:7px 14px;cursor:pointer;transition:background .2s;font-family:var(--fb);color:#fff;font-size:.85rem;font-weight:500}
.nubtn:hover{background:var(--glh)}
.nav-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--red),#6b000a);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;font-family:var(--fd);flex-shrink:0}
.hmbg{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hmbg span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:.3s}
.mobmenu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(7,7,14,.97);backdrop-filter:blur(20px);z-index:999;padding:20px;flex-direction:column;border-bottom:1px solid var(--glb)}
.mobmenu.open{display:flex}
.mobmenu a{color:var(--g2);font-size:.95rem;font-weight:500;padding:13px 0;border-bottom:1px solid var(--glb);cursor:pointer;display:block}
.mobmenu a:last-child{border:none;color:var(--red);font-weight:700}
/* DROPDOWN */
.uddw{position:relative}
.udd{position:absolute;top:calc(100% + 8px);right:0;background:var(--dk2);border:1px solid var(--glb);border-radius:12px;padding:8px;min-width:200px;display:none;z-index:2000;box-shadow:0 16px 50px rgba(0,0,0,.6)}
.udd.open{display:block}
.udd-hd{padding:10px 12px 12px;border-bottom:1px solid var(--glb);margin-bottom:6px}
.udd-name{font-weight:700;font-size:.9rem;font-family:var(--fd)}
.udd-email{font-size:.72rem;color:var(--g4);margin-top:2px}
.udd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;transition:background .2s;font-size:.85rem;color:var(--g2);background:none;border:none;width:100%;text-align:left;font-family:var(--fb)}
.udd-item:hover{background:var(--gl)}
.udd-item.danger{color:#ff6b6b}
.udd-item.danger:hover{background:rgba(229,9,20,.1)}
.udd-sep{height:1px;background:var(--glb);margin:6px 0}
/* AUTH */
#auth-ov{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);transition:opacity .3s,visibility .3s}
#auth-ov.hidden{opacity:0;visibility:hidden;pointer-events:none}
.amod{background:var(--dk2);border:1px solid var(--glb);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;position:relative;overflow:hidden;max-height:92vh;overflow-y:auto}
.amod::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),transparent)}
.acls{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--g4);font-size:1.3rem;cursor:pointer;transition:color .2s;line-height:1;padding:4px}
.acls:hover{color:#fff}
.alogo{font-family:var(--fd);font-size:1.3rem;font-weight:800;margin-bottom:6px}
.alogo b{color:var(--red)}
.asub{color:var(--g4);font-size:.875rem;margin-bottom:28px;font-weight:300}
.atabs{display:flex;background:rgba(255,255,255,.06);border-radius:8px;padding:3px;margin-bottom:24px}
.atab{flex:1;padding:8px;border-radius:6px;border:none;background:none;color:var(--g4);font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--fb)}
.atab.on{background:var(--red);color:#fff}
.aerr{background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.3);color:#ff8080;border-radius:7px;padding:10px 14px;font-size:.8rem;margin-bottom:14px;display:none}
.aerr.show{display:block}
.aok{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:#4ade80;border-radius:7px;padding:10px 14px;font-size:.8rem;margin-bottom:14px;display:none}
.aok.show{display:block}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g4);margin-bottom:7px}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--glb);border-radius:8px;padding:12px 15px;color:#fff;font-size:.9rem;font-family:var(--fb);outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(229,9,20,.12)}
.fi::placeholder{color:var(--g6)}
.abtn{width:100%;padding:13px;background:var(--red);border:none;border-radius:8px;color:#fff;font-family:var(--fd);font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s,box-shadow .2s,transform .2s;box-shadow:0 0 20px var(--glow);margin-top:4px}
.abtn:hover{background:var(--rd);box-shadow:0 0 35px var(--glow);transform:translateY(-1px)}
.abtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.adiv{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--g6);font-size:.72rem}
.adiv::before,.adiv::after{content:'';flex:1;height:1px;background:var(--glb)}
.demo-note{background:rgba(255,255,255,.04);border:1px solid var(--glb);border-radius:8px;padding:12px;font-size:.75rem;color:var(--g4);text-align:center}
.demo-note b{color:var(--g2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* PAGES */
.page{display:none;min-height:100vh;position:relative;z-index:1}
.page.active{display:block}
/* SHARED */
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
.sec{padding:90px 0}
.slbl{font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:10px;display:block}
.sttl{font-family:var(--fd);font-size:clamp(1.9rem,3.8vw,2.9rem);font-weight:700;line-height:1.15;letter-spacing:-.025em;margin-bottom:14px}
.ssub{color:var(--g4);font-size:1rem;line-height:1.7;font-weight:300;max-width:500px}
.shd{margin-bottom:56px}
.gc{background:var(--gl);border:1px solid var(--glb);border-radius:16px;padding:32px;backdrop-filter:blur(14px);transition:background .3s,border-color .3s,transform .3s,box-shadow .3s;position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.gc:hover{background:var(--glh);border-color:rgba(229,9,20,.3);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 28px rgba(229,9,20,.1)}
.btnp{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;padding:13px 26px;border-radius:8px;font-weight:600;font-size:.9rem;border:none;cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s;box-shadow:0 0 24px var(--glow);font-family:var(--fb)}
.btnp:hover{background:var(--rd);transform:translateY(-2px);box-shadow:0 0 45px var(--glow)}
.btno{display:inline-flex;align-items:center;gap:8px;background:transparent;color:#fff;padding:13px 26px;border-radius:8px;font-weight:600;font-size:.9rem;border:1px solid var(--glb);cursor:pointer;transition:background .2s,border-color .2s,transform .2s;font-family:var(--fb)}
.btno:hover{background:var(--glh);border-color:rgba(255,255,255,.18);transform:translateY(-2px)}
.btnw{background:#fff;color:var(--red);padding:13px 30px;border-radius:8px;font-weight:700;font-size:.9rem;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;display:inline-flex;align-items:center;gap:8px;font-family:var(--fd)}
.btnw:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
@keyframes spin{to{transform:rotate(360deg)}}
.rev{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
.rev.vis{opacity:1;transform:none}
/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;padding-top:68px;position:relative;overflow:hidden}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.28);color:var(--red);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:26px;animation:fiu .6s ease forwards;opacity:0}
.hbadge::before{content:'';width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 2s infinite}
h1.hh{font-family:var(--fd);font-size:clamp(2.8rem,6.5vw,5.6rem);font-weight:800;line-height:1.0;letter-spacing:-.03em;margin-bottom:22px;animation:fiu .6s ease .1s forwards;opacity:0}
h1.hh em{font-style:normal;color:var(--red)}
.hsub{font-size:1.1rem;color:var(--g4);line-height:1.7;max-width:500px;margin-bottom:38px;font-weight:300;animation:fiu .6s ease .2s forwards;opacity:0}
.hbtns{display:flex;gap:14px;flex-wrap:wrap;animation:fiu .6s ease .3s forwards;opacity:0}
.fshp{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(229,9,20,.13),transparent 70%);animation:flt 7s ease-in-out infinite;pointer-events:none}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes fiu{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.scrl{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--g6);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;animation:fi 1s .8s ease forwards;opacity:0}
.sln{width:1px;height:38px;background:linear-gradient(to bottom,var(--red),transparent);animation:sline 1.6s ease-in-out infinite}
@keyframes sline{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
/* HERO STATS */
.hero-stats{display:flex;gap:48px;margin-top:52px;animation:fiu .6s ease .4s forwards;opacity:0}
.hstat-n{font-family:var(--fd);font-size:2.2rem;font-weight:800;letter-spacing:-.03em;display:block}
.hstat-n span{color:var(--red)}
.hstat-l{color:var(--g4);font-size:.8rem;font-weight:300;margin-top:2px;display:block}
/* FEATURES with SVG icons */
.fgg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:18px}
.ficard{display:flex;gap:16px;background:var(--gl);border:1px solid var(--glb);border-radius:14px;padding:24px;transition:background .3s,border-color .3s,transform .3s}
.ficard:hover{background:var(--glh);border-color:rgba(229,9,20,.22);transform:translateY(-3px)}
.fiico{width:44px;height:44px;background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.2);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fiico svg{width:20px;height:20px;stroke:var(--red);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.fittl{font-family:var(--fd);font-weight:700;margin-bottom:5px;font-size:.95rem}
.fidsc{color:var(--g4);font-size:.84rem;line-height:1.6;font-weight:300}
/* TESTIMONIALS */
.tslid{overflow:hidden}
.ttrk{display:flex;gap:22px;transition:transform .5s cubic-bezier(.25,.46,.45,.94)}
.tc{min-width:calc(50% - 11px);background:var(--gl);border:1px solid var(--glb);border-radius:16px;padding:32px;backdrop-filter:blur(12px);flex-shrink:0}
.tcst{color:#FFB800;font-size:.85rem;margin-bottom:14px}
.tctx{color:var(--g2);font-size:.95rem;line-height:1.75;font-weight:300;margin-bottom:22px;font-style:italic}
.tcau{display:flex;align-items:center;gap:11px}
.tcav{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--red),#6b000a);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;font-family:var(--fd);flex-shrink:0}
.tcnm{font-weight:600;font-size:.9rem}
.tcrl{color:var(--g4);font-size:.75rem}
.slbtns{display:flex;gap:9px;margin-top:28px}
.slbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--glb);background:var(--gl);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;font-size:.95rem}
.slbtn:hover{background:var(--red);border-color:var(--red)}
/* CTA */
.ctaban{background:linear-gradient(135deg,var(--red) 0%,#900510 100%);border-radius:20px;padding:76px 56px;text-align:center;position:relative;overflow:hidden}
.ctaban::before{content:'';position:absolute;top:-60%;left:-60%;width:220%;height:220%;background:radial-gradient(circle,rgba(255,255,255,.07),transparent 50%)}
.ctaban h2{font-family:var(--fd);font-size:clamp(1.8rem,3.8vw,2.8rem);font-weight:800;letter-spacing:-.025em;margin-bottom:14px;position:relative}
.ctaban p{font-size:1.05rem;opacity:.82;margin-bottom:32px;font-weight:300;position:relative}
/* PAGE HERO */
.ph{padding:140px 0 72px;text-align:center;position:relative}
.ph h1{font-family:var(--fd);font-size:clamp(2.3rem,5vw,3.8rem);font-weight:800;letter-spacing:-.03em;margin-bottom:14px}
.ph p{color:var(--g4);font-size:1.05rem;font-weight:300}
/* SERVICES PAGE */
.sdg{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:26px}
.sdc{background:var(--gl);border:1px solid var(--glb);border-radius:20px;padding:36px;backdrop-filter:blur(14px);position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s,border-color .3s;cursor:pointer}
.sdc::after{content:'';position:absolute;inset:0;border-radius:20px;background:radial-gradient(circle at 75% 20%,rgba(229,9,20,.07),transparent 60%);opacity:0;transition:opacity .3s}
.sdc:hover{transform:translateY(-8px);box-shadow:0 30px 80px rgba(0,0,0,.4),0 0 40px rgba(229,9,20,.1);border-color:rgba(229,9,20,.38)}
.sdc:hover::after{opacity:1}
.sdc-ico{width:60px;height:60px;background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.22);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.sdc-ico svg{width:28px;height:28px;stroke:var(--red);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.sdtl{font-family:var(--fd);font-size:1.35rem;font-weight:800;margin-bottom:10px}
.sddsc{color:var(--g4);font-size:.9rem;line-height:1.7;font-weight:300;margin-bottom:22px}
.sdfl{list-style:none;margin-bottom:26px;display:flex;flex-direction:column;gap:7px}
.sdfl li{color:var(--g2);font-size:.84rem;display:flex;align-items:center;gap:9px}
.sdfl li::before{content:'';width:5px;height:5px;background:var(--red);border-radius:50%;flex-shrink:0}
.btnpl{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--red);border:1px solid rgba(229,9,20,.38);padding:9px 18px;border-radius:6px;font-size:.84rem;font-weight:600;cursor:pointer;transition:background .2s,border-color .2s;font-family:var(--fb)}
.btnpl:hover{background:rgba(229,9,20,.1);border-color:var(--red)}
/* PRICING */
.ptabs{display:flex;gap:7px;margin-bottom:52px;flex-wrap:wrap}
.ptab{padding:9px 20px;border-radius:8px;border:1px solid var(--glb);background:var(--gl);color:var(--g4);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--fb)}
.ptab.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 20px var(--glow)}
.ppnl{display:none}.ppnl.on{display:block}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(272px,1fr));gap:22px}
.pcard{background:var(--gl);border:1px solid var(--glb);border-radius:20px;padding:36px 32px;backdrop-filter:blur(14px);position:relative;transition:transform .3s,box-shadow .3s}
.pcard:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,.4)}
.pcard.feat{border-color:var(--red);box-shadow:0 0 40px rgba(229,9,20,.18);animation:fglo 3s ease-in-out infinite}
@keyframes fglo{0%,100%{box-shadow:0 0 40px rgba(229,9,20,.18)}50%{box-shadow:0 0 60px rgba(229,9,20,.32)}}
.pbadge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 13px;border-radius:100px;white-space:nowrap}
.ptier{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:7px}
.pprice{font-family:var(--fd);font-size:2.8rem;font-weight:800;letter-spacing:-.03em;margin-bottom:3px}
.pprice span{font-size:.95rem;font-weight:400;color:var(--g4)}
.pdesc{color:var(--g4);font-size:.84rem;margin-bottom:26px;font-weight:300}
.pfl{list-style:none;margin-bottom:28px;display:flex;flex-direction:column;gap:10px}
.pfl li{display:flex;align-items:center;gap:9px;font-size:.875rem;color:var(--g2)}
.pfl li .ck{color:var(--red);font-size:.75rem;flex-shrink:0}
.pfl li.dim{color:var(--g6)}
.pfl li.dim .ck{color:var(--g6)}
.
